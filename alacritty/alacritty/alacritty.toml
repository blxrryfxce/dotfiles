general.import = ["~/.config/wallpapers/colorpalette/alacritty_colors.toml"]

[window]
opacity = 1
padding.x = 2
padding.y = 2
decorations = "Full"
decorations_theme_variant = "Dark" # "Dark"
[font]
normal = { family = "DepartureMono Nerd Font Propo", style = "Regular" }
bold.family = "DepartureMono Nerd Font Propo"
italic.family = "DepartureMono Nerd Font Propo"
bold_italic.family = "DepartureMono Nerd Font Propo"
size = 10.5
builtin_box_drawing = false
